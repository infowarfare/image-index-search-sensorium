<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLIP Image Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --border: #e2e0d8;
      --text: #1a1917;
      --muted: #9e9b93;
      --accent: #2d5be3;
      --accent-light: #eef1fd;
      --danger: #c0392b;
      --success: #2d7a4f;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      padding: 2.5rem 2rem;
      max-width: 1000px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ── Header ── */
    header { margin-bottom: 2rem; }
    .wordmark { font-family: var(--mono); font-size: .75rem; font-weight: 500; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; margin-bottom: .4rem; }
    h1 { font-size: 1.65rem; font-weight: 300; letter-spacing: -.02em; }
    h1 strong { font-weight: 500; }

    /* ── Stats bar ── */
    .stats-bar { display: flex; gap: 10px; margin-bottom: 1.75rem; flex-wrap: wrap; }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow);
    }
    .stat-label { font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .stat-value { font-size: 15px; font-weight: 500; }
    .online { color: var(--success); }
    .offline { color: var(--danger); }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 2px; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .tab {
      padding: 9px 20px;
      border: none;
      background: none;
      font-family: var(--sans);
      font-size: 13.5px;
      font-weight: 400;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
    .tab:hover:not(.active) { color: var(--text); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Inputs ── */
    input[type="text"], input[type="number"] {
      font-family: var(--sans);
      font-size: 14px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,91,227,.1);
    }
    input[type="number"] { width: 68px; text-align: center; }

    /* ── Buttons ── */
    button {
      font-family: var(--sans);
      font-size: 13.5px;
      font-weight: 500;
      padding: 8px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    button:hover { background: var(--bg); border-color: #ccc; }
    button:disabled { opacity: .45; cursor: default; }
    .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
    .btn-primary:hover:not(:disabled) { background: #333; border-color: #333; }
    .btn-primary:disabled { background: var(--muted); border-color: var(--muted); }
    .btn-ghost { background: transparent; border-color: transparent; color: var(--muted); padding: 8px 10px; }
    .btn-ghost:hover { color: var(--text); background: transparent; border-color: transparent; }

    /* ── Search panel ── */
    .search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .search-row input[type="text"] { flex: 1; }
    #status-search { font-size: 12px; font-family: var(--mono); color: var(--muted); margin-bottom: 1rem; min-height: 16px; }

    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .15s, box-shadow .15s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,.09); }
    .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .card-meta { padding: 10px 12px; display: flex; flex-direction: column; gap: 5px; }
    .card-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-score { font-size: 11px; font-family: var(--mono); color: var(--muted); }
    .card-description { font-size: 12px; color: var(--text); line-height: 1.4; margin-top: 2px; }
    .card-keywords { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .card-keyword {
      font-size: 10px;
      font-family: var(--mono);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      color: var(--muted);
    }
    .empty { font-size: 14px; color: var(--muted); padding: 3rem 0; text-align: center; }

    /* ── Index panel ── */
    .dropzone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      background: var(--surface);
      transition: border-color .2s, background .2s;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }
    .dropzone:hover, .dropzone.dragover { border-color: var(--accent); background: var(--accent-light); }
    .dropzone-icon { font-size: 2rem; margin-bottom: .5rem; opacity: .4; }
    .dropzone strong { font-size: 14px; font-weight: 500; color: var(--text); display: block; margin-bottom: 4px; }
    .dropzone p { font-size: 12px; color: var(--muted); font-family: var(--mono); }
    input[type="file"] { display: none; }

    /* ── File cards with metadata ── */
    #file-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.25rem; }

    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 12px;
      align-items: start;
      box-shadow: var(--shadow);
    }

    .file-thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 6px;
      display: block;
      border: 1px solid var(--border);
    }

    .file-fields { display: flex; flex-direction: column; gap: 7px; }
    .file-name { font-size: 12px; font-family: var(--mono); color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

    .meta-row { display: flex; gap: 7px; align-items: center; }
    .meta-label {
      font-size: 10px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      width: 76px;
      flex-shrink: 0;
    }
    .meta-input {
      flex: 1;
      font-family: var(--sans);
      font-size: 13px;
      padding: 5px 9px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .meta-input:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(45,91,227,.1);
    }
    .meta-input::placeholder { color: var(--muted); }

    .keywords-hint { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 1px; }

    /* ── Actions ── */
    .actions { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; }
    #file-count { font-size: 12px; font-family: var(--mono); color: var(--muted); }

    /* ── Progress ── */
    .progress { height: 3px; background: var(--border); border-radius: 99px; margin-bottom: 1rem; overflow: hidden; display: none; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s ease; width: 0%; }

    #status-index { font-size: 12px; font-family: var(--mono); color: var(--muted); min-height: 16px; }
    #status-index.ok { color: var(--success); }
    #status-index.err { color: var(--danger); }
  </style>
</head>
<body>
  <header>
    <div class="wordmark">Visual Search</div>
    <h1><strong>CLIP</strong> Image Search</h1>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">Indexed</span>
      <span class="stat-value" id="doc-count">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">API</span>
      <span class="stat-value" id="api-status">—</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('search')">Search</button>
    <button class="tab" onclick="switchTab('index')">Index</button>
  </div>

  <!-- SEARCH PANEL -->
  <div class="panel active" id="panel-search">
    <div class="search-row">
      <input type="text" id="query" placeholder="e.g. red apple, cat on chair, sunset…" />
      <input type="number" id="topk" value="6" min="1" max="20" title="Number of results" />
      <button onclick="doSearch()">Search</button>
    </div>
    <div id="status-search"></div>
    <div id="grid"></div>
  </div>

  <!-- INDEX PANEL -->
  <div class="panel" id="panel-index">
    <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
      <div class="dropzone-icon">⊕</div>
      <strong>Drop images here or click to browse</strong>
      <p>JPG · PNG · WEBP</p>
    </div>
    <input type="file" id="file-input" multiple accept="image/*" onchange="addFiles(this.files)" />

    <div id="file-list"></div>

    <div class="actions">
      <button class="btn-primary" id="btn-index" onclick="doIndex()" disabled>Index images</button>
      <button class="btn-ghost" onclick="clearFiles()" id="btn-clear" style="display:none">Clear all</button>
      <span id="file-count"></span>
    </div>

    <div class="progress" id="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="status-index"></div>
  </div>

  <script>
    const API = 'http://localhost:8000';
    // Array of { file, description, keywords }
    let selectedFiles = [];

    // ── Stats ──────────────────────────────────────────────────────────────
    async function fetchStats() {
      try {
        const res = await fetch(`${API}/stats`);
        const data = await res.json();
        document.getElementById('doc-count').textContent = data.indexed_images ?? '—';
        const el = document.getElementById('api-status');
        el.textContent = '● Online';
        el.className = 'stat-value online';
      } catch {
        const el = document.getElementById('api-status');
        el.textContent = '● Offline';
        el.className = 'stat-value offline';
      }
    }
    fetchStats();
    setInterval(fetchStats, 5000);

    // ── Tabs ───────────────────────────────────────────────────────────────
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', ['search', 'index'][i] === name);
      });
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`panel-${name}`).classList.add('active');
    }

    // ── Search ─────────────────────────────────────────────────────────────
    document.getElementById('query').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
      const query = document.getElementById('query').value.trim();
      const topk = parseInt(document.getElementById('topk').value) || 6;
      if (!query) return;

      const status = document.getElementById('status-search');
      const grid = document.getElementById('grid');
      status.textContent = 'Searching…';
      grid.innerHTML = '';

      try {
        const res = await fetch(`${API}/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, top_k: topk }),
        });

        if (!res.ok) {
          const err = await res.json();
          status.textContent = `Error: ${err.detail || res.statusText}`;
          return;
        }

        const docs = await res.json();
        status.textContent = `${docs.length} result${docs.length !== 1 ? 's' : ''} for "${query}"`;

        if (docs.length === 0) {
          grid.innerHTML = '<div class="empty">No images found.</div>';
          return;
        }

        grid.innerHTML = docs.map(doc => `
          <div class="card">
            <img src="data:image/jpeg;base64,${doc.image_base64}" alt="${doc.filename}" />
            <div class="card-meta">
              <div class="card-name" title="${doc.filename}">${doc.filename}</div>
              <div class="card-score">${(doc.score * 100).toFixed(1)}% match</div>
              ${doc.description ? `<div class="card-description">${doc.description}</div>` : ''}
              ${doc.keywords && doc.keywords.length ? `
                <div class="card-keywords">
                  ${doc.keywords.map(k => `<span class="card-keyword">${k}</span>`).join('')}
                </div>` : ''}
            </div>
          </div>
        `).join('');
      } catch (e) {
        status.textContent = `Connection error: ${e.message}`;
      }
    }

    // ── Dropzone ───────────────────────────────────────────────────────────
    const dropzone = document.getElementById('dropzone');
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });

    // ── File management ────────────────────────────────────────────────────
    function addFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        if (selectedFiles.find(f => f.file.name === file.name)) continue;
        selectedFiles.push({ file, description: '', keywords: '' });
      }
      renderFileList();
    }

    function removeFile(index) {
      selectedFiles.splice(index, 1);
      renderFileList();
    }

    function clearFiles() {
      selectedFiles = [];
      renderFileList();
      setStatus('', '');
    }

    function onDescriptionChange(index, value) {
      selectedFiles[index].description = value;
    }

    function onKeywordsChange(index, value) {
      selectedFiles[index].keywords = value;
    }

    function renderFileList() {
      const list = document.getElementById('file-list');
      list.innerHTML = selectedFiles.map((entry, i) => `
        <div class="file-card">
          <img class="file-thumb" src="${URL.createObjectURL(entry.file)}" alt="${entry.file.name}" />

          <div class="file-fields">
            <div class="file-name" title="${entry.file.name}">${entry.file.name}</div>

            <div class="meta-row">
              <span class="meta-label">Description</span>
              <input
                class="meta-input"
                type="text"
                placeholder="What is shown in this image?"
                value="${entry.description}"
                oninput="onDescriptionChange(${i}, this.value)"
              />
            </div>

            <div class="meta-row">
              <span class="meta-label">Keywords</span>
              <div style="flex:1">
                <input
                  class="meta-input"
                  style="width:100%"
                  type="text"
                  placeholder="apple, fruit, red, food"
                  value="${entry.keywords}"
                  oninput="onKeywordsChange(${i}, this.value)"
                />
                <div class="keywords-hint">comma-separated</div>
              </div>
            </div>
          </div>

          <button class="btn-ghost" onclick="removeFile(${i})" title="Remove" style="padding:4px 8px; font-size:16px; color:var(--muted);">✕</button>
        </div>
      `).join('');

      const count = selectedFiles.length;
      document.getElementById('file-count').textContent =
        count > 0 ? `${count} image${count !== 1 ? 's' : ''} selected` : '';
      document.getElementById('btn-index').disabled = count === 0;
      document.getElementById('btn-clear').style.display = count > 0 ? 'inline-block' : 'none';
    }

    // ── Status helper ──────────────────────────────────────────────────────
    function setStatus(msg, type = '') {
      const el = document.getElementById('status-index');
      el.textContent = msg;
      el.className = type;
    }

    // ── Index ──────────────────────────────────────────────────────────────
    async function doIndex() {
      if (selectedFiles.length === 0) return;

      const btn = document.getElementById('btn-index');
      const progressWrap = document.getElementById('progress-bar-wrap');
      const progressBar = document.getElementById('progress-bar');

      btn.disabled = true;
      progressWrap.style.display = 'block';
      progressBar.style.width = '10%';
      setStatus(`Uploading ${selectedFiles.length} image${selectedFiles.length !== 1 ? 's' : ''}…`);

      // Build metadata map: { filename -> { description, keywords[] } }
      const metaMap = {};
      for (const entry of selectedFiles) {
        const kw = entry.keywords
          .split(',')
          .map(k => k.trim())
          .filter(Boolean);
        metaMap[entry.file.name] = {
          description: entry.description.trim(),
          keywords: kw,
        };
      }

      const formData = new FormData();
      for (const entry of selectedFiles) formData.append('files', entry.file);
      formData.append('metadata', JSON.stringify(metaMap));

      progressBar.style.width = '40%';

      try {
        const res = await fetch(`${API}/index`, { method: 'POST', body: formData });
        progressBar.style.width = '80%';

        if (!res.ok) {
          const err = await res.json();
          setStatus(`Error: ${err.detail || res.statusText}`, 'err');
          return;
        }

        progressBar.style.width = '100%';
        setStatus(`✓ ${selectedFiles.length} image${selectedFiles.length !== 1 ? 's' : ''} indexed successfully.`, 'ok');
        clearFiles();
        setTimeout(() => {
          progressWrap.style.display = 'none';
          progressBar.style.width = '0%';
        }, 800);
        fetchStats();
      } catch (e) {
        setStatus(`Connection error: ${e.message}`, 'err');
      } finally {
        btn.disabled = selectedFiles.length === 0;
      }
    }
  </script>
</body>
</html>
